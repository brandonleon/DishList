services:
  dishlist:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persist the SQLite database and any config files between restarts.
      # To migrate to PostgreSQL later, remove this volume and set DATABASE_URL below.
      - ./data:/app/data
    environment:
      PORT: "8000"
      # DATABASE_URL is read by storage.py for future PostgreSQL migration.
      # SQLite (default): leave unset or use sqlite:///data/dishlist.db
      # PostgreSQL: DATABASE_URL=postgresql://user:password@host:5432/dishlist
      # DATABASE_URL: ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
