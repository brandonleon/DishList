<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >

  <!-- Syntax highlighting -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
  >

  <style>
    /* ── Layout ── */
    body {
      padding-top: 56px;
      background-color: #f8f9fa;
      color: #212529;
    }

    .sidebar {
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      border-right: 1px solid #dee2e6;
      background: #fff;
      padding: 1.5rem 1rem;
    }

    .content-col {
      max-width: 860px;
      padding: 2rem 2.5rem 4rem;
    }

    /* ── Navbar ── */
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .nav-badge {
      font-size: 0.7rem;
      vertical-align: middle;
    }

    /* ── TOC ── */
    .toc-heading {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6c757d;
      margin-bottom: 0.6rem;
    }

    .toc ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .toc ul ul {
      padding-left: 0.9rem;
    }

    .toc li {
      margin: 1px 0;
    }

    .toc a {
      display: block;
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      color: #495057;
      text-decoration: none;
      border-radius: 4px;
      line-height: 1.4;
    }

    .toc a:hover {
      background-color: #f1f3f5;
      color: #d4520a;
    }

    /* ── Content typography ── */
    .content h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #1a1a1a;
    }

    .content h1 + p {
      font-size: 1.05rem;
      color: #495057;
      margin-bottom: 2rem;
    }

    .content h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #dee2e6;
      color: #1a1a1a;
    }

    .content h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      color: #343a40;
    }

    .content hr {
      margin: 2rem 0;
      border-color: #dee2e6;
    }

    /* ── Code ── */
    .content code {
      font-size: 0.85em;
      background: #f1f3f5;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: #c0392b;
    }

    .content pre {
      background: #f6f8fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0 1.5rem;
    }

    .content pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: 0.82rem;
    }

    /* ── Tables ── */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.5rem;
      font-size: 0.875rem;
    }

    .content th {
      background: #f1f3f5;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      border: 1px solid #dee2e6;
      text-align: left;
    }

    .content td {
      padding: 0.45rem 0.75rem;
      border: 1px solid #dee2e6;
      vertical-align: top;
    }

    .content tr:nth-child(even) td {
      background: #f8f9fa;
    }

    /* ── Blockquotes / callouts ── */
    .content blockquote {
      border-left: 3px solid #d4520a;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      background: #fff8f5;
      color: #495057;
      border-radius: 0 4px 4px 0;
    }

    /* ── Footer ── */
    .page-footer {
      font-size: 0.75rem;
      color: #adb5bd;
      border-top: 1px solid #dee2e6;
      padding: 1.5rem 0;
      margin-top: 3rem;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="#">
        {{ project }}
      </a>
      <span class="badge bg-secondary nav-badge ms-2">docs</span>
    </div>
  </nav>

  <!-- Body -->
  <div class="container-fluid g-0">
    <div class="row g-0">

      <!-- Sidebar -->
      <div class="col-lg-3 col-xl-2 d-none d-lg-block">
        <aside class="sidebar">
          <div class="toc-heading">On this page</div>
          {{ toc }}
        </aside>
      </div>

      <!-- Main content -->
      <div class="col-lg-9 col-xl-10">
        <div class="content-col">
          <article class="content">
            {{ content }}
          </article>

          <footer class="page-footer">
            Built with <a href="https://python-markdown.github.io/" class="text-secondary">Python-Markdown</a>
            and <a href="https://getbootstrap.com/" class="text-secondary">Bootstrap 5</a>.
            Run <code>uv run docs/build.py</code> to regenerate.
          </footer>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmf7GM0MtO4fBIWa/0hDPfMoEe8"
    crossorigin="anonymous"
  ></script>

  <!-- Syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll("pre code").forEach(block => {
        hljs.highlightElement(block);
      });
    });
  </script>

</body>
</html>
