<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "DishList" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/styles.css?v={{ app_version }}" />
  </head>
  <body class="app-body min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-expand-lg app-navbar shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2 text-decoration-none" href="{{ url_for('landing') }}">
          <span class="brand-glow"></span>
          DishList
        </a>
        <div class="d-flex gap-2">
          {% block nav_actions %}{% endblock %}
        </div>
      </div>
    </nav>

    <main class="flex-grow-1">
      <div class="container py-5">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer class="bg-white border-top py-3 text-center small text-muted">
      Potluck magic, powered by
      <a
        href="https://github.com/brandonleon/DishList/"
        class="text-muted text-decoration-none"
        target="_blank"
        rel="noopener"
      >
        DishList v{{ app_version }}
      </a>
    </footer>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/static/tag-picker.js?v={{ app_version }}"></script>
    <script>
    (function () {
      const blobs = [
        { color: 'rgba(136, 192, 208, 0.38)', w: 90,  h: 75 },
        { color: 'rgba(180, 142, 173, 0.32)', w: 85,  h: 70 },
        { color: 'rgba(129, 161, 193, 0.32)', w: 90,  h: 70 },
        { color: 'rgba(163, 190, 140, 0.28)', w: 100, h: 80 },
      ].map((cfg, i) => {
        const el = document.createElement('div');
        el.className = 'bg-blob';
        el.style.width  = cfg.w + 'vw';
        el.style.height = cfg.h + 'vh';
        el.style.backgroundColor = cfg.color;
        el.style.zIndex = i;
        document.body.appendChild(el);
        return { el, x: 0, y: 0, tx: 0, ty: 0, cx: 0, cy: 0, w: cfg.w, h: cfg.h, color: cfg.color  };
      });

      // Quadrant centers in viewport % — blob centers anchor here
      const QUADRANTS = [
        { qx: 25, qy: 25 }, // top-left
        { qx: 75, qy: 25 }, // top-right
        { qx: 25, qy: 75 }, // bottom-left
        { qx: 75, qy: 75 }, // bottom-right
      ];

      function assignQuadrants(order) {
        order.forEach((blobIdx, qi) => {
          const b = blobs[blobIdx];
          const q = QUADRANTS[qi];
          b.cx = q.qx - b.w / 2;
          b.cy = q.qy - b.h / 2;
        });
      }

      // Start each blob in its quadrant
      let quadOrder = [0, 1, 2, 3];
      assignQuadrants(quadOrder);
      blobs.forEach(b => { b.x = b.cx; b.y = b.cy; b.tx = b.cx; b.ty = b.cy; });

      // Pick 2 random blobs and smoothly crossfade their colors
      function swapColors() {
        const [i, j] = [0, 1, 2, 3].sort(() => Math.random() - 0.5).slice(0, 2);
        const a = blobs[i], b = blobs[j];
        const tmp = a.color;
        a.color = b.color;
        b.color = tmp;
        a.el.style.backgroundColor = a.color;
        b.el.style.backgroundColor = b.color;
        setTimeout(swapColors, 20000 + Math.random() * 20000);
      }
      setTimeout(swapColors, 15000 + Math.random() * 10000);

      const EASE  = 0.0004;
      const DRIFT = 0.18;
      const PULL  = 0.008;
      let last = performance.now();

      function tick(now) {
        const dt = Math.min(now - last, 50);
        last = now;
        const step = dt / 16;
        blobs.forEach(b => {
          b.tx += (Math.random() - 0.5) * DRIFT * step;
          b.ty += (Math.random() - 0.5) * DRIFT * step;
          b.tx += (b.cx - b.tx) * PULL * step;
          b.ty += (b.cy - b.ty) * PULL * step;
          b.x += (b.tx - b.x) * EASE * dt;
          b.y += (b.ty - b.y) * EASE * dt;
          b.el.style.transform = `translate(${b.x}vw, ${b.y}vh)`;
        });
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
