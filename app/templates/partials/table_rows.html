{% if table_dishes %}
  {% for dish in table_dishes %}
    <tr>
      <td class="fw-semibold">{{ dish.dish_name }}</td>
      <td>{{ dish.dish_type }}</td>
      <td>{{ dish.contributor }}</td>
      <td>{{ dish.notes or '—' }}</td>
      <td class="text-nowrap text-muted small">{{ dish.created_at | format_dish_timestamp }}</td>
    </tr>
  {% endfor %}
{% else %}
  <tr>
    <td colspan="5" class="text-center py-4 text-muted">
      No dishes match this search just yet.
    </td>
  </tr>
{% endif %}
