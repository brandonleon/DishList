{% if card_dishes %}
  {% for dish in card_dishes %}
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
              <p class="text-uppercase small text-muted mb-1">{{ dish.dish_type }}</p>
              <h3 class="h5 mb-0">{{ dish.dish_name }}</h3>
            </div>
            <span class="badge bg-primary-subtle text-primary flex-shrink-0 ms-2">{{ dish.contributor }}</span>
          </div>
          {% if dish.notes %}
            <p class="small text-secondary mb-0 mt-2">{{ dish.notes }}</p>
          {% endif %}
        </div>
        <div class="card-footer text-muted small">
          Added {{ dish.created_at | format_dish_timestamp }}
        </div>
      </div>
    </div>
  {% endfor %}
{% else %}
  <div class="col">
    <div class="card h-100 shadow-sm">
      <div class="card-body text-center text-muted py-5">
        No dishes match this search yet.
      </div>
    </div>
  </div>
{% endif %}
