name: Auto-tag stable releases

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Tag if new stable version
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can compare tags

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version is stable (X.Y.Z only, no pre-release suffix)
        id: stable
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_stable=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "Version '$VERSION' is a pre-release — skipping tag."
          fi

      - name: Check if tag v${{ steps.version.outputs.value }} already exists
        id: tag_exists
        if: steps.stable.outputs.is_stable == 'true'
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          if git tag --list | grep -qx "$TAG"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "Tag '$TAG' already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: >
          steps.stable.outputs.is_stable == 'true' &&
          steps.tag_exists.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Tagged and pushed $TAG"
