name: Version check

on:
  pull_request:
    branches:
      - main

jobs:
  stable-version:
    name: Require stable version for main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Fail if version is not stable (X.Y.Z)
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "✅ Version '$VERSION' is stable — merge allowed."
          else
            echo "❌ Version '$VERSION' is a pre-release."
            echo ""
            echo "Only stable versions (X.Y.Z) may be merged to main."
            echo "Run 'uv version --bump stable' to cut a release, then update this PR."
            exit 1
          fi
